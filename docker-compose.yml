# TDAConcierge log receiver — runs on the NUC.
#
#   log-receiver  the Node app: ingest endpoint + SQLite store + dashboard.
#   caddy         reverse proxy that terminates HTTPS on a custom port
#                 (${LOG_PORT}). It gets a Let's Encrypt cert for ${LOG_DOMAIN}
#                 via the DuckDNS DNS-01 challenge (no port 80 needed) and
#                 proxies to log-receiver:8080.
#
# Forward your chosen ${LOG_PORT} on the router to this NUC. (Home Assistant
# keeps its own port, e.g. :8123 — unaffected.)
#
# Bring it up:   docker compose up -d --build
# Values come from the .env file next to this one (see .env.example).

services:
  log-receiver:
    build: ./app
    image: tda-log-receiver
    container_name: tda-log-receiver
    restart: unless-stopped
    environment:
      - INGEST_TOKEN=${INGEST_TOKEN}
      - DASH_USER=${DASH_USER}
      - DASH_PASS=${DASH_PASS}
      - RETAIN_DAYS=${RETAIN_DAYS:-30}
      - PORT=8080
    volumes:
      - ./data:/data            # SQLite DB persists here on the NUC
    expose:
      - "8080"                  # internal only; Caddy reaches it over the network
    ports:
      - "8080:8080"             # optional: reach the dashboard on the NUC LAN (http)
    networks: [tda]

  caddy:
    build: ./caddy              # custom image: Caddy + DuckDNS DNS plugin
    image: tda-caddy
    container_name: tda-caddy
    restart: unless-stopped
    environment:
      - LOG_DOMAIN=${LOG_DOMAIN}
      - LOG_PORT=${LOG_PORT:-9443}
      - ACME_EMAIL=${ACME_EMAIL}
      - DUCKDNS_TOKEN=${DUCKDNS_TOKEN}
    ports:
      - "${LOG_PORT:-9443}:${LOG_PORT:-9443}"   # public HTTPS for dashboard + /ingest
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data        # persisted certs — keep this volume!
      - caddy_config:/config
    depends_on:
      - log-receiver
    networks: [tda]

volumes:
  caddy_data:
  caddy_config:

networks:
  tda:
    driver: bridge
